<html>
<head>
    <title>SUPERS LIST</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>SUPERS LIST</h1>

<div class="grid">
    {% for hero in heroes %}
    <div class="card">
        <img src="{{ hero.image }}">
        <h2>{{ hero.name }}</h2>
        <p>{{ hero.info }}</p>
    </div>
    {% endfor %}
</div>

<button onclick="history.back()">Назад</button>

</body>
</html>
