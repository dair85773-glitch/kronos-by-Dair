<html>
<head>
    <title>SEARCH SUPER</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>SEARCH SUPER</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Введите имя">
    <input type="submit" value="Найти">
</form>

<div class="grid {% if results|length == 1 %}single{% endif %}"></div>
{% if results %}
    {% for hero in results %}
    <div class="card">
        <img src="{{ hero.image }}">
        <h2>{{ hero.name }}</h2>
        <p>{{ hero.info }}</p>
    </div>
    {% endfor %}
{% elif results is not none %}
    <p>Nothing found</p>
{% endif %}
</div>

<button onclick="history.back()">Назад</button>

</body>
</html>
